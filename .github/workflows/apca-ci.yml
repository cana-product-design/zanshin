name: APCA Contrast Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  apca:
    name: Run APCA regression suite (29 tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run APCA Vitest suite
        run: npm run test:apca

      - name: Typecheck
        run: npm run typecheck
